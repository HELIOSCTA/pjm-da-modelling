name: helioscta-power-pjm

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ────── PJM Tie Flows Hourly ──────
  # Hourly umbrella: scrape PJM 5-min tie flows, rebuild dbt hourly
  # aggregation mart, export parquet.
  #
  # Upstream posts every 5 min. We run 15 minutes past the hour so the
  # just-completed hour has all twelve 5-min intervals landed before
  # dbt aggregates. Staggered off forecast (:05) and fuel_mix (:10).

  - name: PJM Tie Flows Hourly
    entrypoint: schedulers/prefect/power/pjm/pjm_tie_flows_hourly_flows.py:pjm_tie_flows_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [pjm, power, tie_flows_hourly]
    schedules:

      # ────── Hourly at :15 ──────
      - cron: "15 * * * *"
        timezone: "America/Denver"
