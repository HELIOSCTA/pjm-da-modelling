name: helioscta-power-pjm

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ────── PJM Transmission Outages Hourly ──────
  # Hourly flow: scrape eDART linesout.txt, capture SCD2 snapshot of the source,
  # then build the four view marts (active / 7-day window / 24h changes simple +
  # snapshot variants).
  #
  # Upstream cadence: PJM publishes linesout.txt continuously throughout the
  # day. Hourly captures keep the SCD2 history granular so the
  # changes_24h_snapshot mart's diff_text resolves which capture window each
  # state-transition / schedule-push landed in. Each run is ~45-60s (scrape +
  # snapshot insert + 4 view rebuilds).

  - name: PJM Transmission Outages Daily
    entrypoint: schedulers/prefect/power/pjm/pjm_transmission_outages_daily_flows.py:pjm_transmission_outages_daily
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [pjm, power, transmission_outages_daily]
    schedules:

      # ────── Hourly at :00 ──────
      - cron: "0 * * * *"
        timezone: "America/Denver"
