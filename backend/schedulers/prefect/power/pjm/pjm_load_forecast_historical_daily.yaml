name: helioscta-power-pjm

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ────── PJM Load Forecast Historical Daily ──────
  # Daily catch-up of PJM's load_frcstd_hist (historical load forecast)
  # archive — pulls the last 7 days of preserved vintages, rebuilds the
  # D-1 @ 10:00 AM EPT cutoff mart, and publishes the parquet to the
  # modelling cache. Runs once per day at 23:00 MST so all of today's
  # PJM vintages are in (DA cutoff for tomorrow's delivery, plus any
  # late D-2/earlier corrections) before the snapshot is rebuilt.

  - name: PJM Load Forecast Historical Daily
    entrypoint: schedulers/prefect/power/pjm/pjm_load_forecast_historical_daily_flows.py:pjm_load_forecast_historical_daily
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [pjm, power, load_forecast, historical, daily]
    schedules:

      # ────── 23:00 MST daily ──────
      - cron: "0 23 * * *"
        timezone: "America/Denver"
