name: helioscta-power-pjm

prefect-version: 3.0.0

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

deployments:

  # ────── PJM Forecast Hourly ──────
  # Hourly umbrella: scrape PJM load + gridstatus solar/wind forecasts,
  # rebuild dbt forecast marts (load, solar, wind, net_load — DA cutoff),
  # then export each mart to parquet for downstream consumers.

  - name: PJM Forecast Hourly
    entrypoint: schedulers/prefect/power/pjm/pjm_forecast_hourly_flows.py:pjm_forecast_hourly
    work_pool:
      name: default-agent-pool
      work_queue_name: default
    tags: [pjm, power, forecast_hourly]
    schedules:

      # ────── Hourly at :05 ──────
      # Upstream forecasts (PJM load, gridstatus solar/wind) publish at/near
      # the top of the hour; a 5-minute buffer lets them finalize.
      - cron: "5 * * * *"
        timezone: "America/Denver"
