version: 2

sources:

  - name: pjm_v1
    schema: pjm
    tables:
      - name: hourly_load_metered
        description: "Hourly metered (actual) load by load area from PJM Data Miner 2. Updated daily with ~2 day lag."
      - name: hourly_load_prelim
        description: "Hourly preliminary real-time load by load area from PJM Data Miner 2. Available same-day with ~1 hour lag."
      - name: five_min_instantaneous_load_v1_2025_oct_15
        description: "Five-minute instantaneous load by load area from PJM API. Near real-time with ~5 minute lag."
      - name: hrl_dmd_bids
        description: "Hourly day-ahead demand bids (cleared load) by load area and market region from PJM Data Miner 2."
      - name: da_hrl_lmps
        description: "Hourly day-ahead LMPs (total, energy, congestion, loss) by pricing node from PJM Data Miner 2."
      - name: rt_settlements_verified_hourly_lmps
        description: "Hourly real-time verified settlement LMPs by pricing node from PJM Data Miner 2. Updated with ~60 day lag."
      - name: rt_unverified_hourly_lmps
        description: "Hourly real-time unverified (preliminary) LMPs by pricing node from PJM Data Miner 2. Available same-day."
      - name: seven_day_outage_forecast
        description: "Seven-day generation outage forecast (total, planned, maintenance, forced MW) by region from PJM API."
      - name: day_gen_capacity
        description: "Hourly system-wide PJM generation capacity (eco_max, emerg_max, total_committed) from PJM Data Miner 2. Backward-only — today/tomorrow not published. eco_max excludes outages; total_committed is RPM-cleared installed capacity, structural and effectively flat day-to-day."
      - name: five_min_tie_flows
        description: "Five-minute actual and scheduled tie flows by interface from PJM API."
      - name: seven_day_load_forecast_v1_2025_08_13
        description: "Seven-day hourly load forecast by forecast area from PJM API. Multiple revisions per day."
      - name: historical_load_forecasts
        description: "Historical hourly load forecast (load_frcstd_hist) by forecast area from PJM API. First available 2011-01-01; ~5-6 vintages preserved per delivery hour with irregular spacing. Native granularity is RTO + MIDATL + 9 zones (AEP, APS, ATSI, COMED, DAY, DEOK, DOM, DUQ, EKPC) with no WEST/SOUTH aggregates — the source model standardizes by mapping SOUTH=DOM and WEST=RTO-MIDATL-DOM to match the live seven-day feed. Used for D-1 vintage matching in backtests."
      - name: ancillary_services
        description: "Ancillary services prices (synchronized reserve, non-synchronized reserve, secondary reserve, regulation) from PJM Data Miner 2. Hourly grain."
      - name: dispatched_reserves
        description: "Dispatched reserve quantity, requirement, clearing price, and shortage indicator by area and reserve type from PJM Data Miner 2. 5-minute updates, 30-day retention."
      - name: unverified_five_min_lmps
        description: "Unverified 5-minute real-time LMPs by pricing hub from PJM Data Miner 2. Reveals intra-hour spike severity masked by hourly averages."
      - name: solar_generation_by_area
        description: "Hourly realized solar generation by PJM area (RTO, MIDATL, WEST, SOUTH, RFC, OTHER) from PJM Data Miner 2. First available 2019-04-02. RFC = MIDATL + WEST; RTO = MIDATL + WEST + SOUTH; OTHER is non-RTO and not summed in. Pads forward-dated and unreported hours with 0 (~2-day publication lag); 5-min companion feed used as fallback in marts."
      - name: wind_generation_by_area
        description: "Hourly realized wind generation by PJM area (RTO, MIDATL, WEST, SOUTH, RFC, OTHER) from PJM Data Miner 2. First available 2011-01-01. RFC = MIDATL + WEST; RTO = MIDATL + WEST + SOUTH; OTHER is non-RTO and not summed in. Pads forward-dated and unreported hours with 0 (~2-day publication lag); 5-min companion feed used as fallback in marts."
      - name: five_min_solar_generation_v1_2026_apr_28
        description: "Five-minute realized RTO-total solar generation from PJM Data Miner 2. System-wide only (no area column). Used as intra-day fallback for the hourly solar_generation_by_area feed when the latter is still 0-padded; only fills the RTO row of the mart."
      - name: instantaneous_wind_gen_v1_2026_apr_28
        description: "15-second realized RTO-total wind generation from PJM Data Miner 2 (PJM names this 'instantaneous'). System-wide only (no area column). Used as intra-day fallback for the hourly wind_generation_by_area feed when the latter is still 0-padded; only fills the RTO row of the mart."

  - name: gridstatus_v1
    schema: gridstatus
    tables:
      - name: pjm_load_forecast
        description: "PJM 7-day load forecast by region, ingested via GridStatus. Regions already normalized (RTO, MIDATL, WEST, SOUTH)."
      - name: pjm_fuel_mix_hourly
        description: "PJM hourly fuel mix generation by fuel type (coal, gas, nuclear, wind, solar, etc.) from GridStatus."
      - name: pjm_solar_forecast_hourly
        description: "PJM 2-day hourly solar generation forecast (front-of-meter and behind-the-meter) from GridStatus."
      - name: pjm_wind_forecast_hourly
        description: "PJM 2-day hourly wind generation forecast from GridStatus."